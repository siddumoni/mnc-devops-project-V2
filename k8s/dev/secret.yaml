# PLACEHOLDER SKELETON — do not put real passwords here.
# The Jenkins pipeline injects the real DB_PASSWORD from AWS SSM
# using: kubectl create secret --dry-run=client -o yaml | kubectl apply -f -
# That command overwrites this skeleton at every deploy.
apiVersion: v1
kind: Secret
metadata:
  name: app-db-secret
  namespace: dev
  labels:
    app: mnc-app
    environment: dev
  annotations:
    managed-by: "jenkins-pipeline"
type: Opaque
data: {}
